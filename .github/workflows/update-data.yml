name: Update Coach IA data

# Cron : toutes les 15 minutes + déclenchement manuel possible
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Permissions pour committer data.js et tokens
permissions:
  contents: write

# Empêche deux jobs simultanés (évite conflits de commit)
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .env from secrets
        run: |
          cat > .env <<EOF
          INTERVALS_ATHLETE_ID=${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY=${{ secrets.INTERVALS_API_KEY }}
          WHOOP_CLIENT_ID=${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET=${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REDIRECT_URI=http://localhost:8765/callback
          EOF

      - name: Run fetch_data.py
        run: python -X utf8 fetch_data.py

      - name: Commit data & tokens to private repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data.js data.json streams.js .whoop_tokens.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Pas de changement, rien à committer."
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Deploy dashboard to public repo
        env:
          DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          # Cloner le repo public dans un sous-dossier
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/Yanisjaber/coach-ia-dashboard.git public_repo

          # Copier les fichiers du dashboard
          cp dashboard.html public_repo/index.html
          cp data.js public_repo/
          cp data.json public_repo/
          cp streams.js public_repo/ 2>/dev/null || true

          cd public_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Pas de changement à déployer."
          else
            git commit -m "Deploy: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Cleanup .env
        if: always()
        run: rm -f .env

name: Update Coach IA data

# Cron : toutes les 15 minutes + déclenchement manuel + push
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .env from secrets
        run: |
          cat > .env <<EOF
          STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }}
          WHOOP_CLIENT_ID=${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET=${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REDIRECT_URI=http://localhost:8765/callback
          FTP=${{ secrets.FTP }}
          HR_MAX=${{ secrets.HR_MAX }}
          LTHR=${{ secrets.LTHR }}
          EOF

      - name: Run fetch_data.py
        run: python -X utf8 fetch_data.py

      - name: Prepare index.html for GitHub Pages
        run: cp dashboard.html index.html

      - name: Commit data, tokens & dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data.js data.json streams.js .whoop_tokens.json .strava_tokens.json index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Pas de changement, rien à committer."
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Cleanup .env
        if: always()
        run: rm -f .env
